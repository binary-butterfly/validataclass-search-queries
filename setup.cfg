[metadata]
name = validataclass_search_queries
author = binary butterfly GmbH
author_email = lexi.stelter@binary-butterfly.de
description = Shared Python library for search queries (filters, pagination, sorting) based on validataclass.
long_description = file: README.md
long_description_content_type = text/markdown
url = https://git.sectio-aurea.org/common/validataclass-search-queries
project_urls =
    Documentation = https://git.sectio-aurea.org/public_libraries/validataclass-search-queries/-/blob/main/docs/index.md
    Changelog = https://git.sectio-aurea.org/public_libraries/validataclass-search-queries/-/blob/main/CHANGELOG.md
    Issue Tracker = https://git.sectio-aurea.org/public_libraries/validataclass-search-queries/-/issues

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.8
install_requires =
    typing-extensions ~= 4.3
    validataclass ~= 0.6.2
    sqlalchemy ~= 1.4

[options.packages.find]
where = src

[options.extras_require]
testing =
    pytest ~= 7.1
    pytest-cov ~= 3.0
    coverage ~= 6.4
